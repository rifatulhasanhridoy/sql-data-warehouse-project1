<svg viewBox="0 0 1150 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1150" height="700" fill="#ffffff"/>
  <text x="40" y="45" font-size="26" font-weight="bold" fill="#1e293b">Data Flow (Lineage)</text>
  <line x1="40" y1="60" x2="1110" y2="60" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Column headers -->
  <text x="70" y="105" font-size="15" font-weight="bold" fill="#334155">Sources</text>
  <text x="330" y="95" font-size="15" font-weight="bold" fill="#334155">Bronze Layer</text>
  <text x="640" y="95" font-size="15" font-weight="bold" fill="#334155">Silver Layer</text>
  <text x="945" y="95" font-size="15" font-weight="bold" fill="#334155">Gold Layer</text>

  <!-- Sources -->
  <rect x="50" y="130" width="150" height="500" fill="none" stroke="#94a3b8" stroke-dasharray="4,3" rx="6"/>
  <rect x="80" y="200" width="90" height="45" fill="#fde68a" stroke="#d97706" rx="4"/>
  <text x="125" y="228" font-size="13" font-weight="bold" text-anchor="middle" fill="#78350f">CRM</text>
  <rect x="80" y="430" width="90" height="45" fill="#fde68a" stroke="#d97706" rx="4"/>
  <text x="125" y="458" font-size="13" font-weight="bold" text-anchor="middle" fill="#78350f">ERP</text>

  <!-- Bronze column -->
  <rect x="315" y="130" width="230" height="500" fill="none" stroke="#c2703d" stroke-dasharray="4,3" rx="6"/>
  <g font-size="12.5" fill="#5c3317">
    <rect x="335" y="160" width="190" height="34" fill="#fed7aa" stroke="#c2703d" rx="4"/>
    <text x="430" y="182" text-anchor="middle" font-weight="bold">crm_sales_details</text>
    <rect x="335" y="210" width="190" height="34" fill="#fed7aa" stroke="#c2703d" rx="4"/>
    <text x="430" y="232" text-anchor="middle" font-weight="bold">crm_cust_info</text>
    <rect x="335" y="260" width="190" height="34" fill="#fed7aa" stroke="#c2703d" rx="4"/>
    <text x="430" y="282" text-anchor="middle" font-weight="bold">crm_prd_info</text>
    <rect x="335" y="420" width="190" height="34" fill="#fed7aa" stroke="#c2703d" rx="4"/>
    <text x="430" y="442" text-anchor="middle" font-weight="bold">erp_cust_az12</text>
    <rect x="335" y="470" width="190" height="34" fill="#fed7aa" stroke="#c2703d" rx="4"/>
    <text x="430" y="492" text-anchor="middle" font-weight="bold">erp_loc_a101</text>
    <rect x="335" y="520" width="190" height="34" fill="#fed7aa" stroke="#c2703d" rx="4"/>
    <text x="430" y="542" text-anchor="middle" font-weight="bold">erp_px_cat_g1v2</text>
  </g>

  <!-- Silver column -->
  <rect x="625" y="130" width="230" height="500" fill="none" stroke="#64748b" stroke-dasharray="4,3" rx="6"/>
  <g font-size="12.5" fill="#334155">
    <rect x="645" y="160" width="190" height="34" fill="#e2e8f0" stroke="#64748b" rx="4"/>
    <text x="740" y="182" text-anchor="middle" font-weight="bold">crm_sales_details</text>
    <rect x="645" y="210" width="190" height="34" fill="#e2e8f0" stroke="#64748b" rx="4"/>
    <text x="740" y="232" text-anchor="middle" font-weight="bold">crm_cust_info</text>
    <rect x="645" y="260" width="190" height="34" fill="#e2e8f0" stroke="#64748b" rx="4"/>
    <text x="740" y="282" text-anchor="middle" font-weight="bold">crm_prd_info</text>
    <rect x="645" y="420" width="190" height="34" fill="#e2e8f0" stroke="#64748b" rx="4"/>
    <text x="740" y="442" text-anchor="middle" font-weight="bold">erp_cust_az12</text>
    <rect x="645" y="470" width="190" height="34" fill="#e2e8f0" stroke="#64748b" rx="4"/>
    <text x="740" y="492" text-anchor="middle" font-weight="bold">erp_loc_a101</text>
    <rect x="645" y="520" width="190" height="34" fill="#e2e8f0" stroke="#64748b" rx="4"/>
    <text x="740" y="542" text-anchor="middle" font-weight="bold">erp_px_cat_g1v2</text>
  </g>

  <!-- Gold column -->
  <rect x="935" y="130" width="180" height="500" fill="none" stroke="#b45309" stroke-dasharray="4,3" rx="6"/>
  <g font-size="12.5" fill="#78350f">
    <rect x="950" y="230" width="150" height="36" fill="#fde68a" stroke="#b45309" rx="4"/>
    <text x="1025" y="253" text-anchor="middle" font-weight="bold">fact_sales</text>
    <rect x="950" y="330" width="150" height="36" fill="#fde68a" stroke="#b45309" rx="4"/>
    <text x="1025" y="353" text-anchor="middle" font-weight="bold">dim_customers</text>
    <rect x="950" y="430" width="150" height="36" fill="#fde68a" stroke="#b45309" rx="4"/>
    <text x="1025" y="453" text-anchor="middle" font-weight="bold">dim_products</text>
  </g>

  <!-- connecting lines, sources -> bronze -->
  <g stroke="#94a3b8" stroke-width="1.4" fill="none">
    <path d="M170,222 L335,177"/>
    <path d="M170,222 L335,227"/>
    <path d="M170,222 L335,277"/>
    <path d="M170,452 L335,437"/>
    <path d="M170,452 L335,487"/>
    <path d="M170,452 L335,537"/>
  </g>

  <!-- bronze -> silver (straight across) -->
  <g stroke="#94a3b8" stroke-width="1.4">
    <line x1="525" y1="177" x2="645" y2="177"/>
    <line x1="525" y1="227" x2="645" y2="227"/>
    <line x1="525" y1="277" x2="645" y2="277"/>
    <line x1="525" y1="437" x2="645" y2="437"/>
    <line x1="525" y1="487" x2="645" y2="487"/>
    <line x1="525" y1="537" x2="645" y2="537"/>
  </g>

  <!-- silver -> gold -->
  <g stroke="#94a3b8" stroke-width="1.4" fill="none">
    <path d="M835,177 L950,248"/>
    <path d="M835,227 L950,345"/>
    <path d="M835,277 L950,355"/>
    <path d="M835,437 L950,348"/>
    <path d="M835,487 L950,445"/>
    <path d="M835,537 L950,455"/>
  </g>
</svg>
