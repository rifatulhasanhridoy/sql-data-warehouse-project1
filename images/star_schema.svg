<svg viewBox="0 0 1150 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1150" height="620" fill="#ffffff"/>
  <text x="40" y="45" font-size="26" font-weight="bold" fill="#1e293b">Sales Data Mart</text>
  <text x="300" y="45" font-size="15" fill="#64748b">(Star Schema)</text>
  <line x1="40" y1="60" x2="1110" y2="60" stroke="#e2e8f0" stroke-width="2"/>

  <!-- dim_customers -->
  <rect x="60" y="120" width="260" height="380" fill="#ffffff" stroke="#b45309" stroke-width="1.5" rx="6"/>
  <rect x="60" y="120" width="260" height="36" fill="#fde68a" rx="6"/>
  <text x="190" y="144" font-size="14" font-weight="bold" text-anchor="middle" fill="#78350f">gold.dim_customers</text>
  <g font-size="12.5" fill="#334155">
    <text x="78" y="176" font-weight="bold">PK</text><text x="115" y="176" text-decoration="underline">customer_key</text>
    <text x="115" y="198">customer_id</text>
    <text x="115" y="220">customer_number</text>
    <text x="115" y="242">first_name</text>
    <text x="115" y="264">last_name</text>
    <text x="115" y="286">country</text>
    <text x="115" y="308">marital_status</text>
    <text x="115" y="330">gender</text>
    <text x="115" y="352">birthdate</text>
  </g>
  <text x="330" y="230" font-size="11" text-anchor="end" fill="#64748b">marital_status:</text>
  <text x="330" y="245" font-size="11" text-anchor="end" fill="#64748b">- Married  - Single</text>

  <!-- fact_sales -->
  <rect x="450" y="150" width="250" height="320" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <rect x="450" y="150" width="250" height="36" fill="#bfdbfe" rx="6"/>
  <text x="575" y="174" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">gold.fact_sales</text>
  <g font-size="12.5" fill="#334155">
    <text x="468" y="206">order_number</text>
    <text x="468" y="228" font-weight="bold">FK1</text><text x="510" y="228" text-decoration="underline">product_key</text>
    <text x="468" y="250" font-weight="bold">FK2</text><text x="510" y="250" text-decoration="underline">customer_key</text>
    <text x="468" y="272">order_date</text>
    <text x="468" y="294">shipping_date</text>
    <text x="468" y="316">due_date</text>
    <text x="468" y="338">sales_amount</text>
    <text x="468" y="360">quantity</text>
    <text x="468" y="382">price</text>
  </g>
  <text x="468" y="440" font-size="11.5" font-weight="bold" fill="#1e3a8a">Sales Calculation</text>
  <text x="468" y="456" font-size="11.5" fill="#334155">sales_amount = quantity × price</text>

  <!-- dim_products -->
  <rect x="830" y="120" width="260" height="380" fill="#ffffff" stroke="#b45309" stroke-width="1.5" rx="6"/>
  <rect x="830" y="120" width="260" height="36" fill="#fde68a" rx="6"/>
  <text x="960" y="144" font-size="14" font-weight="bold" text-anchor="middle" fill="#78350f">gold.dim_products</text>
  <g font-size="12.5" fill="#334155">
    <text x="848" y="176" font-weight="bold">PK</text><text x="885" y="176" text-decoration="underline">product_key</text>
    <text x="885" y="198">product_id</text>
    <text x="885" y="220">product_number</text>
    <text x="885" y="242">product_name</text>
    <text x="885" y="264">category_id</text>
    <text x="885" y="286">category</text>
    <text x="885" y="308">subcategory</text>
    <text x="885" y="330">maintenance</text>
    <text x="885" y="352">cost</text>
    <text x="885" y="374">product_line</text>
    <text x="885" y="396">start_date</text>
  </g>
  <text x="1105" y="330" font-size="11" fill="#64748b">maintenance:</text>
  <text x="1105" y="345" font-size="11" fill="#64748b">- Yes  - No</text>

  <!-- relationship lines -->
  <line x1="320" y1="230" x2="450" y2="250" stroke="#64748b" stroke-width="1.4"/>
  <line x1="700" y1="228" x2="830" y2="230" stroke="#64748b" stroke-width="1.4"/>
  <text x="335" y="245" font-size="16" fill="#64748b">1</text>
  <text x="435" y="245" font-size="16" fill="#64748b">∞</text>
  <text x="705" y="225" font-size="16" fill="#64748b">∞</text>
  <text x="815" y="225" font-size="16" fill="#64748b">1</text>

  <text x="40" y="565" font-size="12" fill="#94a3b8">Two dimension tables (customers, products) joined to a central fact table (sales) via surrogate keys.</text>
</svg>
