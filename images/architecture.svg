<svg viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1400" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="45" font-size="26" font-weight="bold" fill="#1e293b">High-Level Architecture</text>
  <line x1="40" y1="60" x2="1360" y2="60" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Section labels -->
  <text x="70" y="105" font-size="17" font-weight="bold" fill="#334155">Sources</text>
  <text x="330" y="95" font-size="13" fill="#64748b">SQL Server</text>
  <text x="330" y="105" font-size="17" font-weight="bold" fill="#334155">Data Warehouse</text>
  <text x="1230" y="105" font-size="17" font-weight="bold" fill="#334155">Consume</text>

  <!-- Sources box -->
  <rect x="50" y="130" width="190" height="430" fill="none" stroke="#94a3b8" stroke-dasharray="4,3" stroke-width="1.5" rx="6"/>
  <rect x="90" y="200" width="110" height="55" fill="#fde68a" stroke="#d97706" rx="4"/>
  <text x="145" y="233" font-size="14" font-weight="bold" text-anchor="middle" fill="#78350f">CRM</text>
  <rect x="90" y="290" width="110" height="55" fill="#fde68a" stroke="#d97706" rx="4"/>
  <text x="145" y="323" font-size="14" font-weight="bold" text-anchor="middle" fill="#78350f">ERP</text>
  <text x="70" y="420" font-size="12" fill="#64748b">Object Type: CSV Files</text>
  <text x="70" y="440" font-size="12" fill="#64748b">Interface: Files in Folders</text>

  <!-- Arrow Sources -> DW -->
  <polygon points="245,300 285,300 285,290 305,310 285,330 285,320 245,320" fill="#93c5fd"/>

  <!-- Data Warehouse container -->
  <rect x="315" y="130" width="850" height="430" fill="none" stroke="#94a3b8" stroke-dasharray="4,3" stroke-width="1.5" rx="6"/>

  <!-- Bronze -->
  <rect x="345" y="150" width="240" height="30" fill="#f5cba7" stroke="#c2703d" rx="4"/>
  <text x="465" y="171" font-size="15" font-weight="bold" text-anchor="middle" fill="#5c3317">Bronze Layer</text>
  <rect x="345" y="195" width="240" height="345" fill="#fff7ed" stroke="#f5cba7" rx="6"/>
  <text x="465" y="225" font-size="12" text-anchor="middle" fill="#7c5a3a">Stored Procedure</text>
  <ellipse cx="465" cy="260" rx="38" ry="14" fill="#fed7aa" stroke="#c2703d"/>
  <text x="465" y="300" font-size="13" font-weight="bold" text-anchor="middle" fill="#5c3317">Raw Data</text>
  <line x1="365" y1="315" x2="565" y2="315" stroke="#e7c9a9"/>
  <text x="365" y="335" font-size="11.5" font-weight="bold" fill="#5c3317">Object Type:</text>
  <text x="365" y="350" font-size="11.5" fill="#5c3317">Tables</text>
  <text x="365" y="372" font-size="11.5" font-weight="bold" fill="#5c3317">Load:</text>
  <text x="375" y="388" font-size="11" fill="#5c3317">• Batch processing</text>
  <text x="375" y="402" font-size="11" fill="#5c3317">• Full load, truncate &amp; insert</text>
  <text x="365" y="424" font-size="11.5" font-weight="bold" fill="#5c3317">Transformations:</text>
  <text x="375" y="440" font-size="11" fill="#5c3317">None (as-is)</text>
  <text x="365" y="462" font-size="11.5" font-weight="bold" fill="#5c3317">Data Model:</text>
  <text x="375" y="478" font-size="11" fill="#5c3317">None (as-is)</text>

  <!-- Arrow Bronze -> Silver -->
  <polygon points="590,355 625,355 625,345 645,365 625,385 625,375 590,375" fill="#93c5fd"/>

  <!-- Silver -->
  <rect x="655" y="150" width="240" height="30" fill="#e2e8f0" stroke="#64748b" rx="4"/>
  <text x="775" y="171" font-size="15" font-weight="bold" text-anchor="middle" fill="#334155">Silver Layer</text>
  <rect x="655" y="195" width="240" height="345" fill="#f8fafc" stroke="#e2e8f0" rx="6"/>
  <text x="775" y="225" font-size="12" text-anchor="middle" fill="#475569">Stored Procedure</text>
  <ellipse cx="775" cy="260" rx="38" ry="14" fill="#cbd5e1" stroke="#64748b"/>
  <text x="775" y="300" font-size="13" font-weight="bold" text-anchor="middle" fill="#334155">Cleaned &amp;</text>
  <text x="775" y="316" font-size="13" font-weight="bold" text-anchor="middle" fill="#334155">Standardized</text>
  <line x1="675" y1="330" x2="875" y2="330" stroke="#e2e8f0"/>
  <text x="675" y="348" font-size="11.5" font-weight="bold" fill="#334155">Object Type:</text>
  <text x="675" y="363" font-size="11.5" fill="#334155">Tables</text>
  <text x="675" y="384" font-size="11.5" font-weight="bold" fill="#334155">Transformations:</text>
  <text x="685" y="400" font-size="11" fill="#334155">• Deduplication (ROW_NUMBER)</text>
  <text x="685" y="414" font-size="11" fill="#334155">• Trimming, standardization</text>
  <text x="685" y="428" font-size="11" fill="#334155">• Normalization, type casting</text>
  <text x="685" y="442" font-size="11" fill="#334155">• Null handling &amp; enrichment</text>
  <text x="675" y="464" font-size="11.5" font-weight="bold" fill="#334155">Data Model:</text>
  <text x="685" y="480" font-size="11" fill="#334155">None (as-is)</text>

  <!-- Arrow Silver -> Gold -->
  <polygon points="900,355 935,355 935,345 955,365 935,385 935,375 900,375" fill="#93c5fd"/>

  <!-- Gold -->
  <rect x="965" y="150" width="185" height="30" fill="#fde68a" stroke="#b45309" rx="4"/>
  <text x="1057" y="171" font-size="15" font-weight="bold" text-anchor="middle" fill="#78350f">Gold Layer</text>
  <rect x="965" y="195" width="185" height="345" fill="#fffbeb" stroke="#fde68a" rx="6"/>
  <ellipse cx="1057" cy="245" rx="34" ry="13" fill="#fde68a" stroke="#b45309"/>
  <text x="1057" y="280" font-size="13" font-weight="bold" text-anchor="middle" fill="#78350f">Business-Ready</text>
  <text x="1057" y="296" font-size="13" font-weight="bold" text-anchor="middle" fill="#78350f">Data (Views)</text>
  <line x1="985" y1="312" x2="1130" y2="312" stroke="#fde68a"/>
  <text x="985" y="330" font-size="11.5" font-weight="bold" fill="#78350f">Transformations:</text>
  <text x="995" y="346" font-size="11" fill="#78350f">• Integration</text>
  <text x="995" y="360" font-size="11" fill="#78350f">• Aggregation</text>
  <text x="995" y="374" font-size="11" fill="#78350f">• Business logic</text>
  <text x="985" y="396" font-size="11.5" font-weight="bold" fill="#78350f">Data Model:</text>
  <text x="995" y="412" font-size="11" fill="#78350f">Star Schema</text>

  <!-- Arrow DW -> Consume -->
  <polygon points="1175,300 1210,300 1210,290 1230,310 1210,330 1210,320 1175,320" fill="#93c5fd"/>

  <!-- Consume -->
  <rect x="1240" y="130" width="120" height="430" fill="none" stroke="#94a3b8" stroke-dasharray="4,3" stroke-width="1.5" rx="6"/>
  <text x="1300" y="230" font-size="12.5" text-anchor="middle" fill="#334155">BI &amp;</text>
  <text x="1300" y="246" font-size="12.5" text-anchor="middle" fill="#334155">Reporting</text>
  <text x="1300" y="340" font-size="12.5" text-anchor="middle" fill="#334155">Ad-Hoc</text>
  <text x="1300" y="356" font-size="12.5" text-anchor="middle" fill="#334155">SQL Queries</text>
  <text x="1300" y="450" font-size="12.5" text-anchor="middle" fill="#334155">Machine</text>
  <text x="1300" y="466" font-size="12.5" text-anchor="middle" fill="#334155">Learning</text>
</svg>
